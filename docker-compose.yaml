version: "3"
services:
  mongoDB:
    image: mongo
    ports: 
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
  mongoExpress:
    image: mongo-express
    ports: 
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_SERVER: mongoDB
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    depends_on:
      - mongoDB
  my-app:
    image: hardipsolanki22/my-app:1.0
    ports:
        - 3001:3001
    environment:
      MONGO_URI: ${MONGO_URI}
      PORT: 3001
    depends_on:
          - mongoDB
volumes:
  mongo-data:
    driver: local

