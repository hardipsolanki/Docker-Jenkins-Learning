version: "3"
services:
  mongoDB:
    image: mongo
    ports: 
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db
  mongoExpress:
    image: mongo-express
    ports: 
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_SERVER: mongoDB
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
  my-app:
    image: my-app:1.0
    ports:
        - 3001:3001
    depends_on:
          - mongoDB
volumes:
  mongo-data:
    driver: local

